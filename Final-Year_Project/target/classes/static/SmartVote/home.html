<!DOCTYPE html>
<html>
<head>
<title>Vote Arena</title>
<link rel="stylesheet" href="home.css">
<style>
body{font-family:Arial,sans-serif;margin:0;padding:0;background:#f0f4f8;}
.title{text-align:center;margin:30px 0;font-size:32px;color:#333;}
.search-box{text-align:center;margin-bottom:20px;}
.search-box input{padding:10px;width:300px;border-radius:6px;border:1px solid #ccc;font-size:16px;}
.card-container{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;}
.card{background:white;width:220px;padding:15px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.2);text-align:center;cursor:pointer;transition:0.3s;}
.card:hover{transform: translateY(-5px);box-shadow:0 10px 20px rgba(0,0,0,0.3);}
button{padding:8px 15px;border:none;border-radius:6px;background:#667eea;color:white;cursor:pointer;transition:0.3s;}
button:hover{background:#5a67d8;}
</style>
</head>
<body>

<h1 class="title">Vote Arena</h1>
<div class="search-box">
<input type="text" placeholder="Search election..." id="searchInput">
</div>

<div class="card-container" id="cardContainer">
<!-- Cards generated here -->
</div>

<script>
// ✅ Check voter login
let voter = JSON.parse(localStorage.getItem("voterLoggedIn"));
if(!voter){
    window.location.href = "voter-login.html";
}

// Sample static cards
const cardsData = [
    {title:"School/College President", desc:"Vote for your president"},
    {title:"Sports Captain", desc:"Vote for sports captain"},
    {title:"Class Representative", desc:"Select your class leader"},
    {title:"Cultural Head", desc:"Choose cultural head"},
    {title:"Event Voting", desc:"Vote your favourite"},
    {title:"Award Voting", desc:"Choose the best"},
    {title:"Club Voting", desc:"Support your club"},
    {title:"Employee/Office Voting", desc:"Pick your workplace hero"}
];

const elections = JSON.parse(localStorage.getItem("elections")) || [];
const container = document.getElementById("cardContainer");

// Generate cards
cardsData.forEach((cardData, index)=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
        <h2>${cardData.title}</h2>
        <p>${cardData.desc}</p>
        <button>Vote</button>
    `;
    card.querySelector("button").onclick = ()=>{
        // Check voter login
        if(!voter){ alert("Please login first!"); window.location.href="voter-login.html"; return;}
        if(elections.length===0){ alert("❌ No election available!"); return; }
        let code = prompt("Enter election access code:");
        // Find the first matching election for simplicity
        const election = elections.find(e=>e.accessCode===code);
        if(election){
            localStorage.setItem("selectedElection", JSON.stringify(election));
            window.location.href = "vote.html";
        }else{
            alert("❌ Invalid access code!");
        }
    }
    container.appendChild(card);
});

// Search functionality
const searchInput = document.getElementById("searchInput");
searchInput.addEventListener("keyup", function(){
    const value = searchInput.value.toLowerCase();
    Array.from(container.children).forEach(card=>{
        const text = card.textContent.toLowerCase();
        card.style.display = text.includes(value) ? "block" : "none";
    });
});
</script>

</body>
</html>
